<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
}

#mainButton{
padding:20px 40px;
font-size:24px;
border:none;
border-radius:50px;
background:#ff4d6d;
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}
#mainButton:hover{transform:scale(1.1);}

#birthdayMessage{
display:none;
flex-direction:column;
align-items:center;
animation:fade 2s forwards;
}

h1{
font-size:45px;
color:white;
animation:bounce 1.5s infinite;
text-shadow:0 5px 10px rgba(0,0,0,0.3);
}

h2{
color:white;
margin-top:10px;
font-size:30px;
}

/* Hearts */
.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

@keyframes float{
0%{transform:translateY(100vh) scale(0.5);}
100%{transform:translateY(-10vh) scale(1.5);}
}
</style>
</head>

<body>

<button id="mainButton">Click Here ❤️</button>

<div id="birthdayMessage">
<h1>Happy Birthday My Love ❤️</h1>
<h2>Fatima ❤️</h2>
</div>

<audio id="music">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const btn=document.getElementById("mainButton");
const msg=document.getElementById("birthdayMessage");
const music=document.getElementById("music");

btn.onclick=()=>{
btn.style.display="none";
msg.style.display="flex";
music.play();
hearts();
};

function hearts(){
for(let i=0;i<60;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(h);
}
}
</script>

</body>
</html>
